        function initGame() {
            let localData = localStorage.getItem("my_custom_plots_v7_final");
            if (localData) {
                storyDatabase = JSON.parse(localData);
            } else {
                if (typeof myPlotsData !== 'undefined' && Object.keys(myPlotsData).length > 0) {
                    storyDatabase = JSON.parse(JSON.stringify(myPlotsData));
                } else {
                    storyDatabase = {
                        "0": {
                            "title": "⏳ 【起點】前塵溯源",
                            "text": "這是你的自製故事起點。請點選上方打開「劇本命運線」後台來開始規劃擴充你的全新人生吧！",
                            "choices": []
                        }
                    };
                }
                localStorage.setItem("my_custom_plots_v7_final", JSON.stringify(storyDatabase));
            }
            
            let savedPos = localStorage.getItem("my_plots_positions_v7_final");
            if (savedPos) customNodePositions = JSON.parse(savedPos);
            
            activeFocusedRootKey = "0";

            // 🎯 【黃金網格標準】：橫向起點 80，間距 290；縱向起點 300，間距 125
            let i = 1;
            Object.keys(storyDatabase).forEach(k => {
                if(!customNodePositions[k]) {
                    // 統一用嚴格的倍數計算初始位置
                    let col = i % 10;
                    let row = Math.floor(i / 10);
                    customNodePositions[k] = { 
                        x: 80 + (col * 290), 
                        y: 300 + (row * 125) 
                    };
                    i++;
                }
            });

            checkUndoButtonVisibility();

            // 動態更新起點選單
            function updateStartNodeSelect() {
                const select = document.getElementById("init-start-node");
                if (!select) return;
                
                // 找出所有起點節點（沒有被任何節點指向的節點，加上節點0）
                let startKeys = Object.keys(storyDatabase).filter(k => {
                    // 節點0永遠是起點
                    if (k === "0") return true;
                    // 檢查是否被其他節點指向
                    let isReferenced = Object.keys(storyDatabase).some(otherKey => {
                        return storyDatabase[otherKey].choices && 
                            storyDatabase[otherKey].choices.some(c => c.next === k);
                    });
                    return !isReferenced;
                });
                
                // 清空並重新填入選項
                select.innerHTML = "";
                startKeys.forEach(key => {
                    const node = storyDatabase[key];
                    const title = node.title || key;
                    const option = document.createElement("option");
                    option.value = key;
                    option.textContent = `【${key}】${title.substring(0, 30)}`;
                    select.appendChild(option);
                });
            }

            // 在 initGame 結尾呼叫
            updateStartNodeSelect();
        }

        function updateInventoryUI() {
            const container = document.getElementById("player-inventory");
            if (playerInventory.length === 0) {
                container.innerHTML = `<span style="color:#666; font-size:12px; font-style:italic;">空無一物...</span>`;
                return;
            }
            container.innerHTML = "";
            playerInventory.forEach(item => {
                container.innerHTML += `<span class="item-tag">${item}</span>`;
            });
        }

        function updateHeroinesUI() {
            const container = document.getElementById("player-heroines");
            const keys = Object.keys(playerHeroines);
            if (keys.length === 0) {
                container.innerHTML = `<span style="color:#666; font-size:12px; font-style:italic;">暫無紅顏因果...</span>`;
                return;
            }
            container.innerHTML = "";
            keys.forEach(name => {
                const h = playerHeroines[name];
                let waifuTag = "";
                
                // 根據狀態文字決定渲染樣式
                if (h.status === "傾心伴侶" || h.status.includes("伴侶") || h.status.includes("老婆")) {
                    waifuTag = `<span class="status-waifu">💍 ${h.status}</span>`;
                } else if (h.status === "反目成仇" || h.status.includes("仇人") || h.status.includes("敵人")) {
                    waifuTag = `<span class="status-hate">⚡ ${h.status} (${h.love})</span>`;
                } else {
                    let color = h.love < 0 ? '#e74c3c' : '#aaa';
                    waifuTag = `<span style="color:${color}; font-size:11px;">[${h.status}] 好感度: ${h.love}</span>`;
                }
                
                let barWidth = Math.max(0, Math.min(h.love, 100));
                container.innerHTML += `
                    <div class="heroine-box">
                        <div class="heroine-header"><span>${name}</span>${waifuTag}</div>
                        <div class="heroine-bar-bg"><div class="heroine-bar-fill" style="width: ${barWidth}%;"></div></div>
                    </div>
                `;
            });
        }

        function getTypingSpeedDelay() {
            let val = parseInt(document.getElementById("text-speed-slider").value) || 70;
            return Math.max(0, 100 - val);
        }

        let isTyping = false;
        let typewriterTimer = null;

        function loadNode(nodeKey) {
            currentPlayingKey = nodeKey;
            const logArea = document.getElementById("game-log");
            const choiceBox = document.getElementById("ui-choices");
            
            choiceBox.innerHTML = "";
            if(nodeKey === "0") logArea.innerHTML = "";
            
            const node = storyDatabase[nodeKey];
            if (!node) {
                logArea.innerHTML += `<div class="sys-alert-msg" style="color:#e74c3c;">⚠️ 命運走入了虛無：找不到節點 [${nodeKey}]。</div>`;
                return;
            }

            if (isTyping) {
                clearTimeout(typewriterTimer);
                isTyping = false;
            }

            // 🌟【核心新增】：抓取目前畫面上顯示的玩家自訂姓名
            const currentPlayerName = document.getElementById("display-name").innerText || "墨染";

            // 🌟【核心新增】：將標題與內文中的 {name}、[玩家名稱]、@玩家 全部動態替換掉
            let rawTitle = node.title || "";
            let processedTitle = rawTitle
                .replace(/{name}/g, currentPlayerName)
                .replace(/\[玩家名稱\]/g, currentPlayerName)
                .replace(/@玩家/g, currentPlayerName);

            let rawText = node.text || "";
            let processedText = rawText
                .replace(/{name}/g, currentPlayerName)
                .replace(/\[玩家名稱\]/g, currentPlayerName)
                .replace(/@玩家/g, currentPlayerName);

            // 拿掉 HTML 標籤以便打字機運作
            let cleanText = processedText.replace(/<\/?[^>]+(>|$)/g, ""); 
            let lines = cleanText.split("\n").map(l => l.trim()).filter(l => l.length > 0);

            let uniqueId = "block-" + Date.now();
            let blockHtml = `
                        <div style="margin-top:10px;" id="${uniqueId}">
                            <div class="story-block_title">${processedTitle}</div> <div class="story-block" id="text-${uniqueId}"></div>
                            <div id="updates-${uniqueId}"></div>
                        </div>
                    `;
            logArea.innerHTML += blockHtml;
            
            let blockDiv = document.getElementById(uniqueId);
            let textDiv = document.getElementById("text-" + uniqueId);
            let updatesDiv = document.getElementById("updates-" + uniqueId);

            setTimeout(() => {
                blockDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 50);

            isTyping = true;
            let currentLine = 0;
            let currentChar = 0;

            logArea.onclick = function() {
                if (isTyping) finishTyping();
            };

            function finishTyping() {
                isTyping = false;
                clearTimeout(typewriterTimer);
                
                let oldP = textDiv.querySelector(".typing-cursor");
                if(oldP) oldP.classList.remove("typing-cursor");

                textDiv.innerHTML = lines.map(l => `<p>${l}</p>`).join("");
                processUpdates(node, updatesDiv);
                renderChoices(node);
                logArea.onclick = null;

                setTimeout(() => {
                    logArea.scrollTo({ top: logArea.scrollHeight, behavior: 'smooth' });
                }, 100);
            }

            function typeNextChar() {
                if (!isTyping) return;

                if (currentLine < lines.length) {
                    if (currentChar === 0) {
                        let oldP = textDiv.querySelector(".typing-cursor");
                        if(oldP) oldP.classList.remove("typing-cursor");

                        let p = document.createElement("p");
                        p.classList.add("typing-cursor");
                        textDiv.appendChild(p);
                    }
                    let pTags = textDiv.getElementsByTagName("p");
                    let currentP = pTags[pTags.length - 1];

                    if (currentChar < lines[currentLine].length) {
                        currentP.innerHTML += lines[currentLine].charAt(currentChar);
                        currentChar++;

                        let bottomOfText = currentP.offsetTop + currentP.offsetHeight;
                        let bottomOfView = logArea.scrollTop + logArea.clientHeight;
                        if (bottomOfText > bottomOfView) {
                            logArea.scrollTop = bottomOfText - logArea.clientHeight + 30; 
                        }

                        let delay = getTypingSpeedDelay();
                        typewriterTimer = setTimeout(typeNextChar, delay); 
                    } else {
                        currentLine++;
                        currentChar = 0;
                        let lineDelay = getTypingSpeedDelay() * 4 + 50; 
                        typewriterTimer = setTimeout(typeNextChar, lineDelay); 
                    }
                } else {
                    finishTyping();
                }
            }
            
            if (getTypingSpeedDelay() === 0) {
                finishTyping();
            } else {
                typeNextChar();
            }
        }

        function processUpdates(node, targetDiv) {
            let updatesHtml = "";
            if (node.updates) {
                if (node.updates.timeline) {
                    applyTimeLineEffects(node.updates.timeline);
                    updatesHtml += `<div class="sys-alert-msg" style="color:#9b59b6; background:rgba(155,89,182,0.1); border-left-color:#9b59b6;">⏳ 時空發生扭切！你來到了 ${node.updates.timeline === 'modern' ? '【現代都市】' : '【古代修仙界】'}！</div>`;
                }
                if (node.updates.realm) document.getElementById("display-realm").innerText = node.updates.realm;

                let itemsToProcess = [];
                if (node.updates.itemAction && node.updates.itemName) {
                    itemsToProcess.push({action: node.updates.itemAction, name: node.updates.itemName});
                }
                if (node.updates.items && Array.isArray(node.updates.items)) {
                    itemsToProcess = itemsToProcess.concat(node.updates.items);
                }
                itemsToProcess.forEach(itemData => {
                    const action = itemData.action;
                    const itemName = itemData.name.trim();
                    if(itemName) {
                        if (action === "get" && !playerInventory.includes(itemName)) {
                            playerInventory.push(itemName);
                            updatesHtml += `<div class="sys-alert-msg">✨ 獲得物品：【${itemName}】已放入儲物袋。</div>`;
                        } else if (action === "lose") {
                            playerInventory = playerInventory.filter(i => i !== itemName);
                            updatesHtml += `<div class="sys-alert-msg">❌ 失去物品：【${itemName}】已從背包移除。</div>`;
                        }
                    }
                });
                if(itemsToProcess.length > 0) updateInventoryUI();

                // 處理位置變更
                if (node.updates.location) {
                    playerLocation = node.updates.location;
                    updateLocationUI();
                    updatesHtml += `<div class="sys-alert-msg" style="color:#45f3ff;">🗺️ 前往：【${playerLocation}】</div>`;
                }

                // 處理功法變動
                if (node.updates.skills && Array.isArray(node.updates.skills)) {
                    node.updates.skills.forEach(skillData => {
                        const action = skillData.action;
                        const skillName = skillData.name.trim();
                        if (skillName) {
                            if (action === "learn" && !playerSkills.includes(skillName)) {
                                playerSkills.push(skillName);
                                updatesHtml += `<div class="sys-alert-msg" style="color:#f1c40f;">📖 習得功法：【${skillName}】</div>`;
                            } else if (action === "forget") {
                                playerSkills = playerSkills.filter(s => s !== skillName);
                                updatesHtml += `<div class="sys-alert-msg" style="color:#e74c3c;">📖 遺忘功法：【${skillName}】</div>`;
                            }
                        }
                    });
                    updateSkillsUI();
                }

                let heroinesToProcess = [];
                if (node.updates.loveName) {
                    heroinesToProcess.push({
                        name: node.updates.loveName,
                        eventText: node.updates.loveEventText || "",
                        favChange: parseInt(node.updates.favChange) || 0,
                        relation: node.updates.relation || "相識"
                    });
                }
                if (node.updates.heroines && Array.isArray(node.updates.heroines)) {
                    heroinesToProcess = heroinesToProcess.concat(node.updates.heroines);
                }
                heroinesToProcess.forEach(hData => {
                    const targetName = hData.name.trim();
                    if (!targetName) return;
                    
                    // 🌟 完全自訂化改動：第一次遇到時不再補底 50 點，直接從 0 開始！
                    if (!playerHeroines[targetName]) {
                        playerHeroines[targetName] = { love: 0, status: "相識" };
                    }
                    
                    const evtDesc = hData.eventText ? `<span style="color:#ffc107;">【事件：${hData.eventText}】</span><br>` : "";
                    const fChange = parseInt(hData.favChange) || 0;
                    
                    playerHeroines[targetName].love += fChange;
                    if (hData.relation) {
                        playerHeroines[targetName].status = hData.relation;
                    }
                    
                    let changeWord = fChange >= 0 ? `增加 ${fChange}` : `降低 ${Math.abs(fChange)}`;
                    updatesHtml += `
                        <div class="love-alert-msg">
                            💞 <b>紅顏羈絆變動：</b> 與「${targetName}」的關係發生了變化！<br>
                            ${evtDesc}好感度${changeWord}（目前：${playerHeroines[targetName].love}），當前關係狀態：【${playerHeroines[targetName].status}】
                        </div>
                    `;
                });
                if(heroinesToProcess.length > 0) updateHeroinesUI();
            }
            targetDiv.innerHTML = updatesHtml;
        }

        function renderChoices(node) {
            const choiceBox = document.getElementById("ui-choices");
            choiceBox.innerHTML = "";
            if (node.choices && node.choices.length > 0) {
                node.choices.forEach((c, index) => {
                    let isLocked = false;
                    let lockReason = "";
                    
                    if (c.condType === "item" && c.condValue) {
                        if (!playerInventory.includes(c.condValue.trim())) {
                            isLocked = true;
                            lockReason = ` (需要有物品: 【${c.condValue}】)`;
                        }
                    } else if (c.condType === "love" && c.condHeroine && c.condValue) {
                        let currentLove = playerHeroines[c.condHeroine.trim()] ? playerHeroines[c.condHeroine.trim()].love : 0;
                        if (currentLove < parseInt(c.condValue)) {
                            isLocked = true;
                            lockReason = ` (與 ${c.condHeroine} 的好感度需達 ${c.condValue})`;
                        }
                    }
                    
                    let delay = index * 120; 
                    let animStyle = `animation: popIn 0.4s ease forwards; animation-delay: ${delay}ms; opacity: 0;`;

                    if (isLocked) {
                        choiceBox.innerHTML += `<button class="choice-btn locked" style="${animStyle}" disabled>🔒 ${c.text} ${lockReason}</button>`;
                    } else {
                        choiceBox.innerHTML += `<button class="choice-btn" style="${animStyle}" onclick="loadNode('${c.next}')">👉 ${c.text}</button>`;
                    }
                });
            } else {
                choiceBox.innerHTML += `<div style="text-align:center; padding:10px; color:#555; animation: popIn 0.5s ease forwards; opacity: 0;">🏁 劇情至此暫時告一段落。</div>`;
            }
        }

        function buildFateTreeCanvas() {
            const canvas = document.getElementById("fate-timeline-view");
            const svg = document.getElementById("fate-svg-canvas");
            
            $(".node-wrapper").remove();
            svg.innerHTML = "";

            let allKeys = Object.keys(storyDatabase);
            
            // 建立一個快速查詢位置是否被佔用的 Map
            let positionOccupancy = new Map();
            allKeys.forEach(k => {
                const pos = customNodePositions[k];
                if (pos) {
                    const key = `${pos.x},${pos.y}`;
                    positionOccupancy.set(key, true);
                }
            });
            
            // 輔助函數：檢查某個位置是否已有節點
            function isPositionOccupied(x, y) {
                return positionOccupancy.has(`${x},${y}`);
            }
            
            allKeys.forEach(k => {
                const node = storyDatabase[k];
                const pos = customNodePositions[k] || { x: 100, y: 100 };
                
                let activeClass = (k === currentPlayingKey) ? "active-play" : "";
                let selectClass = (k === selectedEditingKey) ? "selected-trace" : "";
                
                // 計算右側和下方目標位置
                const spacingX = 290;
                const spacingY = 125;
                const rightTargetX = pos.x + spacingX;
                const rightTargetY = pos.y;
                const downTargetX = pos.x;
                const downTargetY = pos.y + spacingY;
                
                // 檢查右側和下方是否已有節點
                const hasRightNode = isPositionOccupied(rightTargetX, rightTargetY);
                const hasDownNode = isPositionOccupied(downTargetX, downTargetY);
                
                // 決定是否顯示按鈕（只有當該位置「空」時才顯示）
                const showRightAdder = !hasRightNode;
                const showDownAdder = !hasDownNode;
                
                // 右側按鈕的 HTML（如果位置已被佔用就不顯示）
                const rightAdderHtml = showRightAdder ? `
                    <div class="quick-adder adder-right" onclick="createNewBranchNode('${k}', 'right')">
                        <div class="dash-preview-box">➕ 橫向順延新劇情</div>
                    </div>
                ` : '';
                
                // 下方按鈕的 HTML
                let downAdderHtml = '';
                if (showDownAdder) {
                    if (k === '0') {
                        downAdderHtml = `
                            <div class="quick-adder adder-down" onclick="createNewStartNode()">
                                <div class="dash-preview-box">➕ 新增平行起點</div>
                            </div>
                        `;
                    } else {
                        downAdderHtml = `
                            <div class="quick-adder adder-down" onclick="createNewBranchNode('${k}', 'down')">
                                <div class="dash-preview-box">➕ 下方開闢全新分支選項</div>
                            </div>
                        `;
                    }
                }
                
                let nodeHtml = `
                    <div class="node-wrapper" id="wrap-${k}" style="left:${pos.x}px; top:${pos.y}px;" data-key="${k}">
                        ${k !== "0" ? '<div class="node-delete-x" onclick="deleteNodeFromCanvas(event, \'' + k + '\')">×</div>' : ''}
                        <div class="fate-node-card ${activeClass} ${selectClass}" onclick="selectNodeForEdit('${k}')">
                            <div class="node-card-title">📍 [${k}] ${node.title || '無標題'}</div>
                            <div class="node-card-preview">${node.text ? node.text.substring(0,18) : ''}...</div>
                        </div>
                        ${rightAdderHtml}
                        ${downAdderHtml}
                    </div>
                `;
                $(canvas).append(nodeHtml);
                makeNodeDraggable(k);
            });

            allKeys.forEach(k => {
                const node = storyDatabase[k];
                if (node.choices && node.choices.length > 0) {
                    node.choices.forEach(c => {
                        if (storyDatabase[c.next]) {
                            drawConnectionLine(k, c.next, c.text);
                        }
                    });
                }
            });
        }

        function makeNodeDraggable(k) {
            let wrapper = document.getElementById(`wrap-${k}`);
            let card = wrapper.querySelector(".fate-node-card");
            let isDragging = false;
            let startX, startY;
            let originalX, originalY;  // ✅ 新增：記錄移動前的原始位置

            function onDragStart(e) {
                if(e.target.classList.contains("node-delete-x")) return;
                isDragging = true;
                let clientX = e.touches ? e.touches[0].clientX : e.clientX;
                let clientY = e.touches ? e.touches[0].clientY : e.clientY;
                startX = clientX - wrapper.offsetLeft;
                startY = clientY - wrapper.offsetTop;
                
                // ✅ 記錄移動前的原始位置
                originalX = customNodePositions[k].x;
                originalY = customNodePositions[k].y;
                
                wrapper.style.zIndex = 200;
            }

            function onDragMove(e) {
                if (!isDragging) return;
                e.preventDefault();
                let clientX = e.touches ? e.touches[0].clientX : e.clientX;
                let clientY = e.touches ? e.touches[0].clientY : e.clientY;
                let nx = clientX - startX;
                let ny = clientY - startY;
                nx = Math.max(0, Math.min(nx, 5500));
                ny = Math.max(0, Math.min(ny, 3800));
                wrapper.style.left = nx + "px";
                wrapper.style.top = ny + "px";
                
                // ✅ 移動過程中只更新 DOM，不更新 customNodePositions
                // 等放開時再決定是否更新
                
                if(e.touches) e.preventDefault(); 
            }

            function onDragEnd() {
                if (isDragging) {
                    isDragging = false;
                    wrapper.style.zIndex = 5;

                    // 獲取目前拖曳後的位置
                    let currentX = parseInt(wrapper.style.left);
                    let currentY = parseInt(wrapper.style.top);
                    
                    // 吸附網格邏輯
                    let rawX = currentX - 80;
                    let rawY = currentY - 300;
                    
                    let finalX = 80 + Math.round(rawX / 290) * 290;
                    let finalY = 300 + Math.round(rawY / 125) * 125;
                    
                    if (finalX < 80) finalX = 80;
                    if (finalY < 50) finalY = 50;

                    // 檢查目標位置是否已被其他節點佔用
                    let isOccupied = false;
                    for (let [otherKey, pos] of Object.entries(customNodePositions)) {
                        if (otherKey !== k) {
                            if (Math.abs(pos.x - finalX) <= 10 && Math.abs(pos.y - finalY) <= 10) {
                                isOccupied = true;
                                break;
                            }
                        }
                    }

                    if (isOccupied) {
                        // ✅ 目標位置被佔用：彈回原始位置
                        wrapper.style.left = originalX + "px";
                        wrapper.style.top = originalY + "px";
                    } else {
                        // ✅ 目標位置空閒：更新到新位置
                        wrapper.style.left = finalX + "px";
                        wrapper.style.top = finalY + "px";
                        customNodePositions[k] = { x: finalX, y: finalY };
                    }
                    
                    updateConnectedLines(k);
                    localStorage.setItem("my_plots_positions_v7_final", JSON.stringify(customNodePositions));
                }
            }

            card.addEventListener("mousedown", onDragStart);
            document.addEventListener("mousemove", onDragMove);
            document.addEventListener("mouseup", onDragEnd);
            card.addEventListener("touchstart", onDragStart, {passive: false});
            document.addEventListener("touchmove", onDragMove, {passive: false});
            document.addEventListener("touchend", onDragEnd);
        }

        function drawConnectionLine(fromKey, toKey, labelText) {
            const svg = document.getElementById("fate-svg-canvas");
            const p1 = customNodePositions[fromKey] || { x:0, y:0 };
            const p2 = customNodePositions[toKey] || { x:0, y:0 };

            let x1 = p1.x + 230; let y1 = p1.y + 37;
            let x2 = p2.x;     let y2 = p2.y + 37;

            let path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            let cp1x = x1 + (x2 - x1) / 2;
            let cp1y = y1;
            let cp2x = x1 + (x2 - x1) / 2;
            let cp2y = y2;
            
            let d = `M ${x1} ${y1} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${x2} ${y2}`;
            path.setAttribute("d", d);
            path.setAttribute("stroke", "rgba(69, 243, 255, 0.45)");
            path.setAttribute("stroke-width", "2.5");
            path.setAttribute("fill", "none");
            path.setAttribute("class", `line-from-${fromKey} line-to-${toKey}`);
            svg.appendChild(path);
        }

        function updateConnectedLines(k) {
            const svg = document.getElementById("fate-svg-canvas");
            // 移除所有與此節點相關的舊連線
            $(`.line-from-${k}`).remove();
            $(`.line-to-${k}`).remove();
            
            // 重新繪製從此節點出發的連線
            if(storyDatabase[k] && storyDatabase[k].choices) {
                storyDatabase[k].choices.forEach(c => {
                    if(storyDatabase[c.next]) drawConnectionLine(k, c.next, c.text);
                });
            }
            // 重新繪製指向此節點的連線
            Object.keys(storyDatabase).forEach(otherKey => {
                if(storyDatabase[otherKey].choices) {
                    storyDatabase[otherKey].choices.forEach(c => {
                        if(c.next === k) drawConnectionLine(otherKey, k, c.text);
                    });
                }
            });
        }
        
        function createNewStartNode() {
            let newId = "node_" + Math.floor(Math.random() * 900000 + 100000);
            
            // 計算新起點的位置：找出所有現有「未被刪除」的起點，放在最下方
            let startKeys = [];
            Object.keys(storyDatabase).forEach(k => {
                // 檢查是否被任何節點指向（被指向的就不是起點）
                let isReferenced = Object.keys(storyDatabase).some(otherKey => {
                    if (otherKey === k) return false;
                    return storyDatabase[otherKey].choices && 
                        storyDatabase[otherKey].choices.some(c => c.next === k);
                });
                if (!isReferenced) {
                    startKeys.push(k);
                }
            });

            // 如果沒有找到起點，至少包含節點0
            if (startKeys.length === 0 && storyDatabase["0"]) {
                startKeys = ["0"];
            }

            // 計算最大 Y 值（只計算存在的節點）
            let maxY = 300;
            startKeys.forEach(k => {
                const pos = customNodePositions[k];
                if (pos && pos.y > maxY) {
                    maxY = pos.y;
                }
            });

            // 新起點放在最大 Y 的下方 125px
            let targetY = maxY + 125;

            // 防重疊：確保新位置沒有被其他節點佔用
            let isOccupied = true;
            let attempts = 0;
            while (isOccupied && attempts < 20) {
                isOccupied = Object.keys(customNodePositions).some(k => {
                    return Math.abs(customNodePositions[k].x - 80) < 10 && 
                        Math.abs(customNodePositions[k].y - targetY) < 10;
                });
                if (isOccupied) {
                    targetY += 125;
                }
                attempts++;
            }
            
            saveBackupToStorage(JSON.parse(JSON.stringify(storyDatabase)), JSON.parse(JSON.stringify(customNodePositions)));
            
            storyDatabase[newId] = {
                title: "🌟 【新起點】命運岔路",
                text: "這是一條全新的命運軌跡。請在此編寫屬於你的傳奇開端...",
                choices: [],
                isCustomStart: true
            };
            
            customNodePositions[newId] = { x: 80, y: targetY };
            
            localStorage.setItem("my_custom_plots_v7_final", JSON.stringify(storyDatabase));
            localStorage.setItem("my_plots_positions_v7_final", JSON.stringify(customNodePositions));
            buildFateTreeCanvas();
            
            selectNodeForEdit(newId);

            updateStartNodeSelect();

            showCustomMessage(`✅ 已新增平行起點節點：【${newId}】`);
        }

        function createNewBranchNode(parentKey, direction) {
            let newId = "node_" + Math.floor(Math.random() * 900000 + 100000);
            let pPos = customNodePositions[parentKey] || { x: 80, y: 300 };
            
            const spacingX = 290;
            const spacingY = 125;
            
            let targetX, targetY;
            
            if (direction === "right") {
                targetX = pPos.x + spacingX;
                targetY = pPos.y;
            } else {
                // 向下：直接放在父節點正下方 + 1px（強行插入）
                targetX = pPos.x;
                targetY = pPos.y + 1;  // 關鍵：+1 而不是 +125
            }
            
            let isOccupied = Object.keys(customNodePositions).some(k => {
                let pos = customNodePositions[k];
                return pos && pos.x === targetX && pos.y === targetY;
            });
            
            if (isOccupied) {
                showCustomMessage("⚠️ 該位置已經有劇情節點！無法在此處新增。");
                return;
            }

            // 🔥 核心：找出所有 Y 座標大於等於 targetY 的節點，全部往下推
            let nodesToPush = [];
            Object.keys(customNodePositions).forEach(k => {
                let pos = customNodePositions[k];
                if (k !== parentKey && pos && pos.x === targetX && pos.y >= targetY) {
                    nodesToPush.push(k);
                }
            });
            
            // 從最下面的開始往下推（避免覆蓋）
            nodesToPush.sort((a, b) => customNodePositions[b].y - customNodePositions[a].y);
            nodesToPush.forEach(k => {
                customNodePositions[k].y += spacingY;
            });
            
            saveBackupToStorage(JSON.parse(JSON.stringify(storyDatabase)), JSON.parse(JSON.stringify(customNodePositions)));
            
            // 創建新節點
            storyDatabase[newId] = {
                title: direction === "right" ? "🆕 衍生主線劇情" : "🌿 全新並列分支",
                text: "在此輸入分支新劇情的發展脈絡內文...",
                choices: []
            };
            
            customNodePositions[newId] = { x: targetX, y: targetY };
            
            // 建立連結
            if (!storyDatabase[parentKey].choices) {
                storyDatabase[parentKey].choices = [];
            }
            
            let alreadyLinked = storyDatabase[parentKey].choices.some(c => c.next === newId);
            if (!alreadyLinked) {
                storyDatabase[parentKey].choices.push({
                    text: direction === "right" ? "👉 繼續前進" : "🔱 新分支選項文字",
                    next: newId
                });
            }
            
            localStorage.setItem("my_custom_plots_v7_final", JSON.stringify(storyDatabase));
            localStorage.setItem("my_plots_positions_v7_final", JSON.stringify(customNodePositions));
            buildFateTreeCanvas();
            
            selectNodeForEdit(newId);
        }

        function deleteNodeFromCanvas(event, k) {
            event.stopPropagation();
            
            if (confirm(`⚠️ 確定要徹底摧毀節點 [${k}] 嗎？\n注意：這將會連帶將其後續派生出來的所有「子孫支線劇情」一併徹底抹除、不留痕跡！`)) {
                
                // 💾 備份快照（萬一刪錯了，依然可以用上方的「復原上一次刪除」一鍵救回！）
                saveBackupToStorage(JSON.parse(JSON.stringify(storyDatabase)), JSON.parse(JSON.stringify(customNodePositions)));
                
                // 🔍 【智能遞迴刪除演算法】：搜出所有派生子節點並連帶拔除
                let nodesToDelete = new Set();
                
                function collectAllChildren(currentKey) {
                    if (nodesToDelete.has(currentKey)) return;
                    
                    // 🌟【新增的安全保護核心】：
                    // 如果目前搜到的節點不是使用者「手動點擊要刪除的源頭節點(k)」，
                    // 且這個節點被標記為了自訂起點（isCustomStart === true），
                    // 那就絕對不能碰它！直接返回攔截，保護它和它的所有子孫！
                    if (currentKey !== k && storyDatabase[currentKey] && storyDatabase[currentKey].isCustomStart === true) {
                        return; 
                    }
                    
                    nodesToDelete.add(currentKey);
                    
                    let node = storyDatabase[currentKey];
                    if (node && node.choices && node.choices.length > 0) {
                        node.choices.forEach(c => {
                            if (storyDatabase[c.next]) {
                                collectAllChildren(c.next); // 遞迴向下追蹤
                            }
                        });
                    }
                }
                
                // 從目前點擊的這張卡片開始往下收集所有要一起陪葬的子孫
                collectAllChildren(k);
                
                // 💥 開始執行跨維度的大抹除
                nodesToDelete.forEach(targetKey => {
                    delete storyDatabase[targetKey];
                    delete customNodePositions[targetKey];
                });
                
                // 🔗 【斬斷上游連結】：檢查大資料庫剩下的人，看是誰的 choices 還留著連到已被刪除卡片的殘留垃圾，把它們也清理乾淨
                Object.keys(storyDatabase).forEach(key => {
                    if (storyDatabase[key].choices) {
                        // 如果選項連往的目標已經不存在於資料庫中，就把該選項過濾掉
                        storyDatabase[key].choices = storyDatabase[key].choices.filter(c => storyDatabase[c.next]);
                    }
                });

                // 💾 同步更新快取與畫布
                localStorage.setItem("my_custom_plots_v7_final", JSON.stringify(storyDatabase));
                localStorage.setItem("my_plots_positions_v7_final", JSON.stringify(customNodePositions));
                
                if (nodesToDelete.has(selectedEditingKey)) closeEditorPanel();
                
                buildFateTreeCanvas();
                showCustomMessage(`🎯 淨化成功！已連帶徹底抹除 ${nodesToDelete.size} 個相關劇本節點。`);
            }
        }

                itemRows.each(function() {

                });

            if (skillRows.length > 0) {

                    let act = $(this).find(".row-skill-action").val();
                    let nm = $(this).find(".row-skill-name").val().trim();
                    if (nm) node.updates.skills.push({ action: act, name: nm });
                });
            }

            let hRows = $(".heroine-config-row");
            if(hRows.length > 0) {
                node.updates.heroines = [];
                hRows.each(function() {
                    let nm = $(this).find(".row-h-name").val();
                    let fav = parseInt($(this).find(".row-h-fav").val()) || 0;
                    let rel = $(this).find(".row-h-rel").val().trim() || "相識";

                    node.updates.heroines.push({ name: nm, eventText: evt, favChange: fav, relation: rel });

            node.choices = [];

            localStorage.setItem("my_custom_plots_v7_final", JSON.stringify(storyDatabase));
            showCustomMessage("💾 當前劇本數據與多重紅顏設定已即時存入緩存！");
            
            buildFateTreeCanvas();
            if(currentPlayingKey === selectedEditingKey) loadNode(currentPlayingKey);

        // 🔥 全新改良版導出函數：會自動清理多餘的 none 條件欄位
        function exportJSON() {
            // 深拷貝一份資料庫，避免影響原始資料
            let cleanDatabase = JSON.parse(JSON.stringify(storyDatabase));
            
            // 遍歷所有節點，清理 choices 中不必要的欄位
            Object.keys(cleanDatabase).forEach(key => {
                const node = cleanDatabase[key];
                if (node.choices && Array.isArray(node.choices)) {
                    node.choices = node.choices.map(choice => {
                        const cleanChoice = { text: choice.text, next: choice.next };
                        
                        // 只有當 condType 存在且不是 "none" 時才保留
                        if (choice.condType && choice.condType !== "none") {
                            cleanChoice.condType = choice.condType;
                            if (choice.condType === "item" && choice.condValue) {
                                cleanChoice.condValue = choice.condValue;
                            } else if (choice.condType === "love") {
                                if (choice.condHeroine) cleanChoice.condHeroine = choice.condHeroine;
                                if (choice.condValue) cleanChoice.condValue = choice.condValue;
                            }
                        }
                        
                        return cleanChoice;
                    });
                }
                
                // 清理空的 updates 物件
                if (node.updates && Object.keys(node.updates).length === 0) {
                    delete node.updates;
                }
            });
            
            // 生成乾淨的 plots.js 內容
            const jsContent = "const myPlotsData = " + JSON.stringify(cleanDatabase, null, 2) + ";\n";
            const dataStr = "data:text/javascript;charset=utf-8," + encodeURIComponent(jsContent);
            const dlAnchor = document.createElement('a');

            dlAnchor.setAttribute("download", "plots.js"); 
            document.body.appendChild(dlAnchor);

            showCustomMessage("✅ 導出完成！");

        // ==========================================
        // 🌌 新增：後台大畫布滑鼠右鍵拖拽平移功能 (Canvas Panning)
        // ==========================================
        (function() {
            let isPanning = false;
            let startX, startY;
            let scrollLeft, scrollTop;

            // 取得大後台的外層滾動容器
            const viewContainer = document.getElementById("fate-timeline-view");

            if (viewContainer) {
                // 1. 阻斷畫布內的瀏覽器預設右鍵選單，避免干擾拖拽
                viewContainer.addEventListener('contextmenu', function(e) {
                    e.preventDefault();
                });

                // 2. 滑鼠按下事件
                viewContainer.addEventListener('mousedown', function(e) {
                    // e.button === 2 代表滑鼠右鍵 (0:左鍵, 1:中鍵, 2:右鍵)
                    // 且確保點擊的目標不是卡片本身（避免干擾卡片內的點擊事件）
                    if (e.button === 2) {
                        isPanning = true;
                        viewContainer.style.cursor = 'grabbing'; // 變成抓取手勢
                        
                        startX = e.pageX - viewContainer.offsetLeft;
                        startY = e.pageY - viewContainer.offsetTop;
                        scrollLeft = viewContainer.scrollLeft;
                        scrollTop = viewContainer.scrollTop;
                    }
                });

                // 3. 滑鼠移動事件
                document.addEventListener('mousemove', function(e) {
                    if (!isPanning) return;
                    e.preventDefault();

                    const x = e.pageX - viewContainer.offsetLeft;
                    const y = e.pageY - viewContainer.offsetTop;
                    
                    // 計算滑鼠移動的距離
                    const walkX = (x - startX); 
                    const walkY = (y - startY);
                    
                    // 讓畫布跟著手勢反向或正向滾動 (減去 walk 代表畫面跟著滑鼠走)
                    viewContainer.scrollLeft = scrollLeft - walkX;
                    viewContainer.scrollTop = scrollTop - walkY;
                });

                // 4. 滑鼠放開或離開視窗事件
                document.addEventListener('mouseup', function(e) {
                    if (isPanning && e.button === 2) {
                        isPanning = false;
                        viewContainer.style.cursor = 'auto';
                    }
                });
            }
        })();
        
        // ==========================================
        // 🚀 新增：一鍵主線自動往右樹狀對齊演算法
        // ==========================================
        function autoAlignTreeLayout() {
            if (!confirm("確定要將所有劇情卡片按照「一直線往右分支」的邏輯自動排列整齊嗎？")) return;

            let rowCounter = 0;
            let visited = new Set();
            
            // 🎯 嚴格對齊四合一標準
            const startX = 80;
            const startY = 300;
            const spacingX = 290;
            const spacingY = 125;

            function layoutNode(key, currentDepth, targetRow) {
                if (visited.has(key)) return;
                visited.add(key);

                let calcX = startX + (currentDepth * spacingX);
                let calcY = startY + (targetRow * spacingY);

                customNodePositions[key] = { x: calcX, y: calcY };

                const node = storyDatabase[key];
                if (node && node.choices && node.choices.length > 0) {
                    node.choices.forEach((c, index) => {
                        if (storyDatabase[c.next] && !visited.has(c.next)) {
                            if (index > 0) {
                                rowCounter++;
                            }
                            layoutNode(c.next, currentDepth + 1, rowCounter);
                        }
                    });
                }
            }

            if (storyDatabase["0"]) {
                layoutNode("0", 0, 0);
            }

            Object.keys(storyDatabase).forEach(k => {
                if (!visited.has(k)) {
                    rowCounter++;
                    customNodePositions[k] = { x: startX, y: startY + (rowCounter * spacingY) };
                }
            });

            localStorage.setItem("my_plots_positions_v7_final", JSON.stringify(customNodePositions));
            buildFateTreeCanvas();
            showCustomMessage("🎯 劇本命運線已完全歸位！現在所有系統的間距均已完美統一！");
        }

        // ==========================================
        // 後台大畫布滑鼠右鍵拖拽平移功能
        // ==========================================
        (function() {
            let isPanning = false;
            let startX, startY;
            let scrollLeft, scrollTop;

            const viewContainer = document.getElementById("fate-timeline-view");

            if (viewContainer) {
                // 阻斷右鍵選單
                viewContainer.addEventListener('contextmenu', function(e) {
                    e.preventDefault();
                });

                // 右鍵按下：開始平移
                viewContainer.addEventListener('mousedown', function(e) {
                    if (e.button === 2) {
                        isPanning = true;
                        viewContainer.style.cursor = 'grabbing';
                        startX = e.pageX - viewContainer.offsetLeft;
                        startY = e.pageY - viewContainer.offsetTop;
                        scrollLeft = viewContainer.scrollLeft;
                        scrollTop = viewContainer.scrollTop;
                    }
                });

                // 移動滑鼠：平移畫布
                document.addEventListener('mousemove', function(e) {
                    if (!isPanning) return;
                    e.preventDefault();
                    const x = e.pageX - viewContainer.offsetLeft;
                    const y = e.pageY - viewContainer.offsetTop;
                    viewContainer.scrollLeft = scrollLeft - (x - startX);
                    viewContainer.scrollTop = scrollTop - (y - startY);
                });

                // 放開右鍵：結束平移
                document.addEventListener('mouseup', function(e) {
                    if (isPanning && e.button === 2) {
                        isPanning = false;
                        viewContainer.style.cursor = 'auto';
                    }
                });
            }
        })();

        function showCustomMessage(msg) {
            const toast = document.getElementById("custom-toast");
            const msgBox = document.getElementById("custom-toast-msg");
            msgBox.innerText = msg;
            toast.style.display = "flex";
        }

        document.getElementById("custom-toast-close").onclick = function() {
            document.getElementById("custom-toast").style.display = "none";
        };

        // 重新改寫的唯一網頁加載進入點
        window.onload = function() {
            initGame();                 // 執行你原本的本地快取與資料庫初始化
            updateScrollStartNodeSelect(); // 配置全新捲軸內部的剧本起點選單
            playScrollIntroSequence();  // 啟動捲軸時序開場動畫
        };
    </script>
</body>
</html>
